version: '3'

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: cpag_mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cpagthesis

  # ── Express Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .                        # root — needed for root package.json
      dockerfile: backend/Dockerfile
    container_name: cpag_backend
    restart: always
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/cpagthesis
      - FRONTEND_URL=http://167.172.73.9/juls4634
      - CORS_ORIGINS=http://167.172.73.9/juls4634
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

  # ── Vite Frontend (served via vite preview) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cpag_frontend
    restart: always
    ports:
      - "3022:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
  uploads_data:
