version: '3.8'

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: cpag_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cpagthesis

  # ── Express Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .                        # root — needed for root package.json
      dockerfile: backend/Dockerfile
    container_name: cpag_backend
    restart: always
    ports:
      - "5000:5000"
    # Load secrets from backend/.env, then override Docker-specific values
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Override localhost mongo with Docker service name
      - MONGO_URI=mongodb://mongodb:27017/cpagthesis
      # Allow the frontend container origin
      - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      # Persist user-uploaded files across container restarts
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

  # ── Vite Frontend (served via vite preview) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cpag_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
  uploads_data:
